<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4a00e0, #8e2de2);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.8;
        }

        .content {
            padding: 24px;
        }

        #task-form {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }

        #task-input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: border-color 0.2s;
            outline: none;
        }

        #task-input:focus {
            border-color: #8e2de2;
        }

        #task-form button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #4a00e0, #8e2de2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
        }

        #task-form button:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(142, 45, 226, 0.4);
        }

        #task-form button:active {
            transform: translateY(0);
        }

        #error-msg {
            background: #fee;
            color: #c00;
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
            display: none;
        }

        .task-count {
            font-size: 13px;
            color: #999;
            margin-bottom: 12px;
            padding-left: 4px;
        }

        #task-list {
            list-style: none;
        }

        #task-list li {
            padding: 14px 16px;
            background: #f8f8ff;
            border-radius: 10px;
            margin-bottom: 8px;
            font-size: 15px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.2s;
        }

        #task-list li:hover {
            background: #f0eeff;
        }

        #task-list li::before {
            content: "";
            width: 8px;
            height: 8px;
            background: #8e2de2;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #bbb;
            font-size: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Todo App</h1>
            <p>Kubernetes / Minikube</p>
        </div>
        <div class="content">
            <form id="task-form">
                <input type="text" id="task-input" placeholder="Nouvelle tache..." required>
                <button type="submit">Ajouter</button>
            </form>
            <div id="error-msg"></div>
            <div class="task-count" id="task-count"></div>
            <ul id="task-list"></ul>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
